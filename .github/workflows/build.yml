name: build-payloader-db

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: clone payloader
        run: |
          git clone --depth=1 https://github.com/3516634930/Payloader.git _src

      - name: prepare dirs
        run: |
          mkdir -p database
          mkdir -p docs

      - name: extract data
        run: |
          node --experimental-strip-types scripts/extract.ts

      - name: build index
        run: |
          node scripts/build_index.js

      - name: generate markdown
        run: |
          python3 scripts/gen_markdown.py

      - name: commit
        run: |
          git config user.name github-actions
          git config user.email actions@github.com

          git add database docs
          git diff --cached --quiet && exit 0

          git commit -m "update payload database"
          git push
